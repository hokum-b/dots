[font]
normal  = { family = "Tamzen", style = "Regular" }
bold    = { family = "Tamzen", style = "Bold" }
italic  = { family = "Tamzen", style = "Italic" }
bold_italic = { family = "Tamzen", style = "Bold Italic" }

# size = 11

[window.padding]
x = 25
y = 25

[colors.primary]
background = '#000000'
foreground = '#d5c0a4'

[colors.cursor]
text = '#000000'
cursor = '#d5c0a4'


[colors.normal]
black   = '#2d2d2d'
red     = '#ffb3ba'
green   = '#baffc9'
yellow  = '#ffffba'
blue    = '#bae1ff'
magenta = '#e8c4ff'
cyan    = '#bafff0'
white   = '#f2f2f2'

[colors.bright]
black   = '#4d4d4d'
red     = '#ffc6cb'
green   = '#caffd6'
yellow  = '#ffffcc'
blue    = '#cce6ff'
magenta = '#f0d8ff'
cyan    = '#ccfff5'
white   = '#ffffff'
